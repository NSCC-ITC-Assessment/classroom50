version: "2"

# Formatters are run separately from linters. CI invokes
# `golangci-lint fmt --diff` and fails on non-empty output, which catches:
#   - gofmt:     whitespace, struct alignment, semantic-equivalent rewrites
#   - goimports: stdlib / blank line / third-party grouping
#
# Apply locally with `golangci-lint fmt`.
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      # Group our own module imports (gh-student internal packages and the
      # shared cli module) after third-party packages, so `golangci-lint fmt`
      # actually enforces the three-group layout the README documents rather
      # than leaving it to drift.
      local-prefixes:
        - github.com/foundation50
