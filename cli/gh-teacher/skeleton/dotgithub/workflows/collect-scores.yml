name: Collect Scores

# Teacher-triggered workflow that polls every <classroom>-<assignment>-*
# repo in the org, downloads autograde.json from each latest submit
# release, and writes a batched update into <classroom>/scores.json.
# Single-writer by design — no concurrent ingest, no per-student
# dispatch event, no broad cross-repo write secret.

on:
  workflow_dispatch:
    inputs:
      classroom:
        description: "Classroom short-name (leave blank to collect all)"
        required: false
  schedule:
    # Nightly autopilot. Comment out the next line if you only want
    # manual triggers.
    - cron: "17 4 * * *"

permissions:
  contents: write       # write scores.json + commit

concurrency:
  group: collect-${{ inputs.classroom || 'all' }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Collect scores (placeholder)
        env:
          CLASSROOM50_COLLECT_TOKEN: ${{ secrets.CLASSROOM50_COLLECT_TOKEN }}
          CLASSROOM_FILTER: ${{ inputs.classroom }}
        run: |
          echo "::warning::collect-scores is not yet wired up."
          python .github/scripts/collect_scores.py
      - name: Commit and push
        run: |
          set -euo pipefail
          if [ -n "$(git status --porcelain '*/scores.json' 2>/dev/null)" ]; then
            git add '*/scores.json'
            git -c user.name=classroom50-bot -c user.email=bot@classroom50 \
                commit -m "collect: refresh scores.json"
            git push
          else
            echo "no scores.json changes to commit"
          fi
